<!DOCTYPE html>
<html>
<head>
  <title>Cart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body onload="loadCart()">

<div class="bg-dark text-white text-center p-3">
  24WH1A0582_Runa - E-TICKETING SYSTEM
</div>

<div class="container-fluid">
  <div class="row">

    <div class="col-md-2 bg-secondary text-white p-3">
      <h5>Menu</h5>
      <a href="events.html" class="text-white d-block">Events</a>
      <a href="cart.html" class="text-white d-block">Cart</a>
    </div>

    <div class="col-md-10 p-4">

      <button class="btn btn-danger float-end" onclick="logout()">Logout</button>

      <h3>Cart</h3>

      <table class="table table-bordered mt-3">
        <thead class="table-primary">
          <tr>
            <th>Event</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Total</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="cartTable"></tbody>
      </table>

      <h5 id="total"></h5>

      <button class="btn btn-success mt-3" onclick="checkout()">Proceed to Checkout</button>

    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
