<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background: #eef2f7; }
    .header {
      background: #2c3e50;
      color: white;
      text-align: center;
      padding: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="header">
  24WH1A0582_Runa - E-TICKETING SYSTEM
</div>

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow w-100" style="max-width:400px;">
    <h4 class="text-center mb-3">Login</h4>

    <input id="loginUser" class="form-control mb-2" placeholder="Username / Email">
    <input id="loginPass" type="password" class="form-control mb-3" placeholder="Password">

    <button class="btn btn-primary w-100" onclick="login()">Login</button>

    <p class="text-center mt-3">
      New User? <a href="register.html">Register</a>
    </p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
