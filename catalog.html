<!DOCTYPE html>
<html>
<head>
  <title>Catalog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  24WH1A0582_Runa - E-BOOK MANAGEMENT SYSTEM
</div>

<div class="layout">

    <h3>Menu</h3>
    <a href="catalog.html">Catalog</a>

  </div>

  <div class="main">
    <button class="logout" onclick="logout()">Logout</button>

      </div>

        <img src="book2.jpeg" class="book-img">
        <h3>Python Programming</h3>
        <p>$199</p>
        <button onclick="addToCart('Python Programming',199)">Add to Cart</button>
      </div>

      <div class="card">
        <img src="book3.jpeg" class="book-img">
        <h3>Full Stack Web Development</h3>
        <p>$399</p>
        <button onclick="addToCart('Full Stack Web Development',399)">Add to Cart</button>
      </div>

    </div>

    <br>
    <a href="cart.html" class="goto">Go to Cart</a>
  </div>

</div>
