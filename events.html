<!DOCTYPE html>
<html>
<head>
  <title>Events</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="bg-dark text-white text-center p-3">
  24WH1A0582_Runa - E-TICKETING SYSTEM
</div>

<div class="container-fluid">
  <div class="row">

    <div class="col-md-2 bg-secondary text-white p-3">
      <h5>Menu</h5>
      <a href="events.html" class="text-white d-block">Events</a>
      <a href="cart.html" class="text-white d-block">Cart</a>
    </div>

    <div class="col-md-10 p-4">

      <div class="d-flex justify-content-between">
        <h3>Events</h3>
        <button class="btn btn-danger" onclick="logout()">Logout</button>
      </div>

      <div class="row mt-3">

        <div class="col-lg-4 mb-3">
          <div class="card text-center shadow">
            <img src="e1.jpeg" class="img-fluid" style="height:200px;">
            <div class="card-body">
              <h5>Concert Night</h5>
              <p>$299</p>
              <button class="btn btn-primary w-100" onclick="addToCart('Concert Night',299)">Book</button>
            </div>
          </div>
        </div>

        <div class="col-lg-4 mb-3">
          <div class="card text-center shadow">
            <img src="e2.jpeg" class="img-fluid" style="height:200px;">
            <div class="card-body">
              <h5>Movie Show</h5>
              <p>$199</p>
              <button class="btn btn-primary w-100" onclick="addToCart('Movie Show',199)">Book</button>
            </div>
          </div>
        </div>

        <div class="col-lg-4 mb-3">
          <div class="card text-center shadow">
            <img src="e3.jpeg" class="img-fluid" style="height:200px;">
            <div class="card-body">
              <h5>Drama Play</h5>
              <p>$399</p>
              <button class="btn btn-primary w-100" onclick="addToCart('Drama Play',399)">Book</button>
            </div>
          </div>
        </div>

      </div>

      <a href="cart.html" class="btn btn-success mt-3">Go to Cart</a>

    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
