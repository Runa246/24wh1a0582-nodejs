<!DOCTYPE html>
<html>
<head>
<title>Simple Calculator</title>

<script>
function calculate(op){

    let number1 = parseInt(document.getElementById("number1").value);
    let number2 = parseInt(document.getElementById("number2").value);
    let result;

    if(op == "add"){
        result = number1 + number2;
    }
    else if(op == "sub"){
        result = number1 - number2;
    }
    else if(op == "mul"){
        result = number1 * number2;
    }
    else if(op == "div"){
        result = number1 / number2;
    }

    document.getElementById("Result_ID").innerHTML = "Result: " + result;
}
</script>

</head>

<body>

<div style="text-align:center;">
<form>

<h2 style="color:rgb(228, 29, 235)">Calculator</h2>
<label style="color:rgb(0, 0, 255) ">Enter number1</label>
<input type="text" id="number1"><br><br>

<label style="color:rgb(0, 0, 255) ">Enter number2</label>
<input type="text" id="number2"><br><br>

<input type="button" value="Add" onclick="calculate('add')">
<input type="button" value="Sub" onclick="calculate('sub')">
<input type="button" value="Mul" onclick="calculate('mul')">
<input type="button" value="Div" onclick="calculate('div')">

<h4 id="Result_ID">Result will be displayed</h4>

</form>
</div>

</body>
</html>
